# nginx para servir el sitio estático compilado (dist/) en el puerto 8080.
server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compresión básica de los recursos de texto.
  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Assets de Astro con hash en el nombre: cache larga e inmutable.
  location /_astro/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Sitio de una sola página: cualquier ruta cae en index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
